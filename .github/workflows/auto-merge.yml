name: Auto-merge Jules PRs

on:
  pull_request:
    types: [opened, reopened, synchronize]

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    # Only auto-merge PRs opened by the Jules bot
    if: contains(github.event.pull_request.user.login, 'jules') || contains(github.event.pull_request.title, '[Jules]') || contains(github.event.pull_request.title, 'jules')
    permissions:
      pull-requests: write
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Auto-merge
        run: gh pr merge "${{ github.event.pull_request.number }}" --squash --auto
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
